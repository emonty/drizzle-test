# Configure rootless podman with pasta networking, netavark/aardvark-dns,
# and unprivileged port binding.
#
# Prerequisites:
#   - Target users (podman_users) must already exist
#   - Ubuntu 24.04+ (packages assume apt)

- name: Install podman and rootless networking packages
  become: true
  apt:
    name: "{{ podman_packages }}"
    state: present
    update_cache: true

- name: Configure subordinate UID range
  become: true
  lineinfile:
    path: /etc/subuid
    regexp: "^{{ ansible_user }}:"
    line: "{{ ansible_user }}:100000:65536"
    create: true

- name: Configure subordinate GID range
  become: true
  lineinfile:
    path: /etc/subgid
    regexp: "^{{ ansible_user }}:"
    line: "{{ ansible_user }}:100000:65536"
    create: true

- name: Create containers config directory
  file:
    path: "{{ ansible_user_dir }}/.config/containers"
    state: directory
    mode: "0755"

- name: Configure podman for pasta networking and netavark
  copy:
    dest: "{{ ansible_user_dir }}/.config/containers/containers.conf"
    content: |
      [network]
      default_rootless_network_cmd = "pasta"

      [engine]
      network_backend = "netavark"
    mode: "0644"
